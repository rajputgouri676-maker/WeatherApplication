<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link

  <body

      <div class="flex flex-col gap-4">
        <input
          type="text"
          placeholder="Enter your city name"
          id="city-name"
          class="w-full px-4 py-3 rounded-xl outline-none border-2 border-whtie/60 text-gray-700 placeholder:gray-400 focus:ring-2 focus:ring-blue-500"
        />
        <button
          class="bg-blue-600 hover:bg-blue-800 text-white font-semibold py-3 rounded-xl transition-all duration-500"
          id="search"
        >
          Search Weather Details
        </button>
      </div>
      <div id="result" class="mt-6 hidden bg-white/40 rounded-2xl p-5"></div>
    </div>
    <script src="./weather.js"></script>
